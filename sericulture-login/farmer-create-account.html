<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeriFusion - Farmer Account</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="index-tailwind.js"></script>
    <link rel="stylesheet" href="index.css">
</head>
<body class="bg-cream flex items-center justify-center font-sans antialiased text-earthy min-h-screen py-10">
    
    <div class="bg-overlay"></div>

    <!-- Decorative floating elements -->
    <main class="glass-card w-full max-w-md mx-4 p-8 sm:p-10 rounded-2xl shadow-glass transform transition-all duration-500 hover:shadow-2xl hover:-translate-y-1">
        <!-- Logo and Header -->
        <div class="text-center mb-8">
            <div class="inline-block p-3 rounded-full bg-cream shadow-soft mb-4 border border-mulberry-light/20">
                <img src="logo.png" alt="SeriFusion Logo" class="w-16 h-16 object-contain rounded-full shadow-sm transition-transform duration-500 hover:scale-105">
            </div>
            <h1 class="text-2xl sm:text-3xl font-bold text-mulberry-dark mb-2">Join as Farmer</h1>
            <p class="text-sm sm:text-base text-earthy/80">Create a farmer account for SeriFusion.</p>
        </div>

        <!-- Create Account Form -->
        <form id="createAccountForm" class="space-y-6" onsubmit="event.preventDefault(); window.location.href='farmer-login.html';">
            
            <!-- Full Name -->
            <div class="space-y-2">
                <label for="name" class="block text-sm font-semibold tracking-wide text-mulberry-dark uppercase">Full Name</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-mulberry-light" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </div>
                    <input type="text" id="name" required
                        class="input-field w-full pl-10 pr-4 py-3 bg-cream border border-gray-200 rounded-lg text-earthy focus:outline-none focus:ring-2 focus:ring-silkgold/50 placeholder-gray-400"
                        placeholder="Farmer Name">
                </div>
            </div>

            <!-- Email -->
            <div class="space-y-2">
                <label for="email" class="block text-sm font-semibold tracking-wide text-mulberry-dark uppercase">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-mulberry-light" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                        </svg>
                    </div>
                    <input type="email" id="email" required
                        class="input-field w-full pl-10 pr-4 py-3 bg-cream border border-gray-200 rounded-lg text-earthy focus:outline-none focus:ring-2 focus:ring-silkgold/50 placeholder-gray-400"
                        placeholder="farmer@example.com">
                </div>
            </div>

            <!-- Password -->
            <div class="space-y-2">
                <label for="password" class="block text-sm font-semibold tracking-wide text-mulberry-dark uppercase">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-mulberry-light" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                        </svg>
                    </div>
                    <input type="password" id="password" required
                        class="input-field w-full pl-10 pr-12 py-3 bg-cream border border-gray-200 rounded-lg text-earthy focus:outline-none focus:ring-2 focus:ring-silkgold/50 placeholder-gray-400"
                        placeholder="••••••••">
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" 
                class="btn-primary w-full py-3.5 px-4 bg-mulberry text-white font-semibold rounded-lg shadow-md hover:bg-mulberry-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-mulberry flex justify-center items-center gap-2">
                <span>Create Farmer Account</span>
                <svg class="w-5 h-5 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
            </button>
        </form>

        <!-- Divider -->
        <div class="mt-8 mb-6 relative">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-300"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-2 bg-white text-gray-500 rounded-full text-xs uppercase tracking-wider">Already a farmer?</span>
            </div>
        </div>

        <!-- Links -->
        <div class="text-center flex flex-col space-y-3">
            <a href="farmer-login.html" class="link-hover text-mulberry font-semibold transition-colors transform inline-block hover:scale-105">Back to Farmer Login</a>
        </div>
    </main>
</body>
</html>
