<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeriFusion - Farm Update</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="index-tailwind.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="global-translate.js"></script>
</head>
<body class="bg-[#f5f7f3] text-earthy antialiased font-sans pb-10">
    <div class="max-w-4xl mx-auto p-8 mt-10 relative z-10">
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-2xl bg-mulberry text-white flex items-center justify-center shadow-md shadow-mulberry/30">
                    <i class="ph ph-note-pencil text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-extrabold text-mulberry-dark">Daily Farm Update</h1>
                    <p class="text-sm font-medium text-gray-500">Record manual entries for your active rearing batch.</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button type="button" onclick="showRecentLogs()" class="hidden sm:flex px-4 py-2 bg-white text-gray-600 border border-gray-200 rounded-lg text-sm font-bold shadow-sm hover:text-mulberry transition-colors items-center gap-2">
                    <i class="ph ph-list-dashes text-lg"></i> Recent Logs
                </button>
                <a href="farmer-home.html" class="hidden sm:flex px-4 py-2 bg-white text-gray-600 border border-gray-200 rounded-lg text-sm font-bold shadow-sm hover:text-mulberry transition-colors items-center gap-2">
                    <i class="ph ph-squares-four text-lg"></i> Dashboard
                </a>
            </div>
        </div>

        <div class="bg-white p-8 sm:p-10 rounded-3xl shadow-sm border border-gray-100 relative">
            <form id="farmUpdateForm" class="space-y-8">
                
                <!-- Section 1: Basic Info -->
                <div>
                    <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2 border-b border-gray-100 pb-2">
                        <i class="ph ph-info text-silkgold"></i> Batch Details
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Date</label>
                            <input type="date" id="logDate" class="w-full bg-gray-50 border border-gray-200 text-gray-800 font-bold rounded-xl focus:ring-mulberry focus:border-mulberry block p-3 outline-none" required>
                        </div>
                        <div>
                            <label class="flex justify-between items-center text-sm font-bold text-gray-700 mb-2">
                                Active Batch ID
                                <button type="button" class="text-xs bg-mulberry/10 text-mulberry hover:bg-mulberry hover:text-white px-2 py-1 rounded transition-colors flex items-center gap-1" onclick="addNewBatch()">
                                    <i class="ph ph-plus font-bold"></i> Add Batch
                                </button>
                            </label>
                            <select id="batchSelect" class="w-full bg-gray-50 border border-gray-200 text-gray-800 font-bold rounded-xl focus:ring-mulberry focus:border-mulberry block p-3 outline-none">
                                <option value="Batch #402">Batch #402 (Current)</option>
                                <option value="Batch #401">Batch #401 (Completed)</option>
                            </select>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold text-gray-700 mb-2">Current Rearing Stage</label>
                            <div class="grid grid-cols-2 md:grid-cols-6 gap-2">
                                <label class="cursor-pointer">
                                    <input type="radio" name="stage" class="peer sr-only" value="1">
                                    <div class="text-center p-2 rounded-xl border-2 border-gray-100 peer-checked:border-mulberry peer-checked:bg-mulberry/10 peer-checked:text-mulberry font-bold text-sm text-gray-500 transition-all">1st Instar</div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="stage" class="peer sr-only" value="2">
                                    <div class="text-center p-2 rounded-xl border-2 border-gray-100 peer-checked:border-mulberry peer-checked:bg-mulberry/10 peer-checked:text-mulberry font-bold text-sm text-gray-500 transition-all">2nd Instar</div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="stage" class="peer sr-only" value="3">
                                    <div class="text-center p-2 rounded-xl border-2 border-gray-100 peer-checked:border-mulberry peer-checked:bg-mulberry/10 peer-checked:text-mulberry font-bold text-sm text-gray-500 transition-all">3rd Instar</div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="stage" class="peer sr-only" value="4" checked>
                                    <div class="text-center p-2 rounded-xl border-2 border-gray-100 peer-checked:border-mulberry peer-checked:bg-mulberry/10 peer-checked:text-mulberry font-bold text-sm text-gray-500 transition-all">4th Instar</div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="stage" class="peer sr-only" value="5">
                                    <div class="text-center p-2 rounded-xl border-2 border-gray-100 peer-checked:border-mulberry peer-checked:bg-mulberry/10 peer-checked:text-mulberry font-bold text-sm text-gray-500 transition-all">5th Instar</div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="stage" class="peer sr-only" value="spin">
                                    <div class="text-center p-2 rounded-xl border-2 border-gray-100 peer-checked:border-mulberry peer-checked:bg-mulberry/10 peer-checked:text-mulberry font-bold text-sm text-gray-500 transition-all">Spinning</div>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Section 2: Environment & Feed -->
                <div>
                    <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2 border-b border-gray-100 pb-2">
                        <i class="ph ph-thermometer text-blue-500"></i> Conditions & Feeding
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Indoor Temp (°C)</label>
                            <input type="number" id="indoorTemp" step="0.1" placeholder="e.g. 26.5" class="w-full bg-gray-50 border border-gray-200 text-gray-800 font-bold rounded-xl focus:ring-mulberry focus:border-mulberry block p-3 outline-none" required>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Indoor Humidity (%)</label>
                            <input type="number" id="indoorHumidity" placeholder="e.g. 75" class="w-full bg-gray-50 border border-gray-200 text-gray-800 font-bold rounded-xl focus:ring-mulberry focus:border-mulberry block p-3 outline-none" required>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Leaf Fed Today (kg)</label>
                            <input type="number" id="leafFed" placeholder="e.g. 120" class="w-full bg-gray-50 border border-gray-200 text-gray-800 font-bold rounded-xl focus:ring-mulberry focus:border-mulberry block p-3 outline-none" required>
                        </div>
                    </div>
                </div>

                <!-- Section 3: Operations -->
                <div>
                    <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2 border-b border-gray-100 pb-2">
                        <i class="ph ph-broom text-green-500"></i> Operations
                    </h3>
                    <div class="flex flex-col gap-4">
                        <label class="flex items-center justify-between p-4 bg-gray-50 rounded-xl border border-gray-100 cursor-pointer hover:border-mulberry transition-colors">
                            <div>
                                <h4 class="font-bold text-gray-800">Bed Cleaning Performed</h4>
                                <p class="text-xs text-gray-500 font-medium">Was the rearing bed cleaned today?</p>
                            </div>
                            <div class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="bedCleaned" class="sr-only peer" checked>
                                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-mulberry"></div>
                            </div>
                        </label>
                        <label class="flex items-center justify-between p-4 bg-gray-50 rounded-xl border border-gray-100 cursor-pointer hover:border-mulberry transition-colors">
                            <div>
                                <h4 class="font-bold text-gray-800">Disinfectant Applied</h4>
                                <p class="text-xs text-gray-500 font-medium">Was Vijetha or bleaching powder applied?</p>
                            </div>
                            <div class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="disinfectantApplied" class="sr-only peer">
                                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-mulberry"></div>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Section 4: Notes & Observations -->
                <div>
                    <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2 border-b border-gray-100 pb-2">
                        <i class="ph ph-warning-circle text-orange-500"></i> Notes & Health Observations
                    </h3>
                    <textarea id="notes" rows="4" placeholder="Mention any dead worms, unusual behavior, or specific actions taken today..." class="w-full bg-gray-50 border border-gray-200 text-gray-800 font-medium rounded-xl focus:ring-mulberry focus:border-mulberry block p-4 outline-none"></textarea>
                </div>

                <!-- Submit -->
                <div class="pt-6 border-t border-gray-100 flex justify-end">
                    <button type="submit" class="px-8 py-4 bg-mulberry text-white rounded-xl font-bold shadow-lg shadow-mulberry/30 hover:bg-mulberry-dark hover:-translate-y-1 transition-all flex items-center gap-2">
                        <i class="ph ph-floppy-disk text-xl"></i> Save Daily Log
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center z-50 px-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl transform scale-95 transition-transform duration-300" id="modalContent">
            <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6 text-green-500">
                <i class="ph ph-check-circle text-5xl"></i>
            </div>
            <h2 class="text-2xl font-extrabold text-gray-800 mb-2">Log Saved!</h2>
            <p class="text-gray-500 font-medium mb-8">Your farm data for today has been recorded successfully.</p>
            <button onclick="closeModal()" class="w-full py-3 bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold rounded-xl transition-colors">Return to Dashboard</button>
        </div>
    </div>

    <!-- Recent Logs Modal -->
    <div id="recentLogsModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center z-50 px-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl p-6 max-w-lg w-full shadow-2xl transform scale-95 transition-transform duration-300 flex flex-col max-h-[80vh]" id="recentLogsContent">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-extrabold text-gray-800">Recent Logs</h2>
                <button onclick="closeRecentLogs()" class="text-gray-400 hover:text-gray-600 transition-colors">
                    <i class="ph ph-x text-2xl"></i>
                </button>
            </div>
            <div id="logsContainer" class="flex-1 overflow-y-auto space-y-4 custom-scrollbar pr-2">
                <!-- Logs will be inserted here dynamically -->
                <div class="text-center text-gray-500 py-8">Loading logs...</div>
            </div>
        </div>
    </div>

    <script>
        // Set today's date automatically
        document.getElementById('logDate').valueAsDate = new Date();

        function addNewBatch() {
            const batchId = prompt("Enter new Batch ID (e.g., Batch #403):");
            if (batchId) {
                const select = document.getElementById('batchSelect');
                const option = document.createElement('option');
                option.value = batchId;
                option.text = batchId + " (Current)";
                select.add(option, select.options[0]);
                select.selectedIndex = 0;
            }
        }

        document.getElementById('farmUpdateForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Gather form data
            const date = document.getElementById('logDate').value;
            const batchId = document.getElementById('batchSelect').value;
            const stage = document.querySelector('input[name="stage"]:checked').value;
            const temp = document.getElementById('indoorTemp').value;
            const humidity = document.getElementById('indoorHumidity').value;
            const leafFed = document.getElementById('leafFed').value;
            const bedCleaned = document.getElementById('bedCleaned').checked;
            const disinfectantApplied = document.getElementById('disinfectantApplied').checked;
            const notes = document.getElementById('notes').value;

            const logData = {
                date, batchId, stage, temp, humidity, leafFed, bedCleaned, disinfectantApplied, notes,
                timestamp: new Date().toISOString()
            };

            try {
                // Change button to loading state
                const submitBtn = document.querySelector('button[type="submit"]');
                const originalText = submitBtn.innerHTML;
                submitBtn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i> Saving...';
                submitBtn.disabled = true;

                await fetch('https://d-e-s-fbaf2-default-rtdb.firebaseio.com/farm-logs.json', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(logData)
                });
                
                showSuccessModal();
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                e.target.reset();
                document.getElementById('logDate').valueAsDate = new Date();
            } catch (error) {
                console.error("Error saving log:", error);
                alert("Failed to save log. Please try again.");
                const submitBtn = document.querySelector('button[type="submit"]');
                submitBtn.innerHTML = '<i class="ph ph-floppy-disk text-xl"></i> Save Daily Log';
                submitBtn.disabled = false;
            }
        });

        async function showRecentLogs() {
            const modal = document.getElementById('recentLogsModal');
            const content = document.getElementById('recentLogsContent');
            const container = document.getElementById('logsContainer');
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
                content.classList.add('scale-100');
            }, 10);

            try {
                const res = await fetch('https://d-e-s-fbaf2-default-rtdb.firebaseio.com/farm-logs.json');
                const data = await res.json();
                
                if (data) {
                    const logs = Object.values(data).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                    container.innerHTML = logs.map(log => `
                        <div class="p-4 border border-gray-100 rounded-xl bg-gray-50 hover:border-mulberry/50 transition-colors">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <span class="text-xs font-bold bg-mulberry/10 text-mulberry px-2 py-1 rounded">${log.batchId}</span>
                                    <span class="text-xs font-bold text-gray-500 ml-2">Stage: ${log.stage}</span>
                                </div>
                                <span class="text-xs font-bold text-gray-400">${log.date}</span>
                            </div>
                            <div class="grid grid-cols-3 gap-2 text-sm mt-3">
                                <div><span class="text-gray-500">Temp:</span> <span class="font-semibold">${log.temp}°C</span></div>
                                <div><span class="text-gray-500">Hum:</span> <span class="font-semibold">${log.humidity}%</span></div>
                                <div><span class="text-gray-500">Feed:</span> <span class="font-semibold">${log.leafFed}kg</span></div>
                            </div>
                            ${log.notes ? `<p class="text-xs text-gray-600 mt-2 bg-white p-2 rounded border border-gray-100">Notes: ${log.notes}</p>` : ''}
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div class="text-center text-gray-500 py-8">No logs found.</div>';
                }
            } catch(e) {
                container.innerHTML = '<div class="text-center text-red-500 py-8">Error loading logs.</div>';
            }
        }

        function closeRecentLogs() {
            const modal = document.getElementById('recentLogsModal');
            const content = document.getElementById('recentLogsContent');
            modal.classList.add('opacity-0');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function showSuccessModal() {
            const modal = document.getElementById('successModal');
            const content = document.getElementById('modalContent');
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
                content.classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('successModal');
            const content = document.getElementById('modalContent');
            modal.classList.add('opacity-0');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }
    </script>
</body>
</html>
