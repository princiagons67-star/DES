<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeriFusion - Settings</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="index-tailwind.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="global-translate.js"></script>
</head>
<body class="bg-[#f5f7f3] text-earthy antialiased font-sans">
    <div class="max-w-3xl mx-auto p-8 mt-10">
        <div class="flex items-center gap-4 mb-8">
            <a href="farmer-home.html" class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm text-gray-500 hover:text-mulberry hover:scale-105 transition-all">
                <i class="ph ph-arrow-left text-xl"></i>
            </a>
            <h1 class="text-3xl font-extrabold text-mulberry-dark">Platform Settings</h1>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 mb-8">
            <div class="flex items-center gap-3 mb-6 pb-4 border-b border-gray-100">
                <div class="w-10 h-10 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center">
                    <i class="ph ph-translate text-xl"></i>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-gray-800">Language Preferences</h2>
                    <p class="text-sm font-medium text-gray-500">Choose your preferred language for the platform</p>
                </div>
            </div>

            <div class="space-y-4">
                <label class="flex items-center justify-between p-4 rounded-2xl border border-gray-200 cursor-pointer hover:border-mulberry transition-colors">
                    <div class="flex items-center gap-3">
                        <span class="text-2xl">🇺🇸</span>
                        <span class="font-bold text-gray-700">English (Default)</span>
                    </div>
                    <input type="radio" name="language" value="en" class="w-5 h-5 text-mulberry focus:ring-mulberry border-gray-300" onchange="setLanguage('en')">
                </label>

                <label class="flex items-center justify-between p-4 rounded-2xl border border-gray-200 cursor-pointer hover:border-mulberry transition-colors">
                    <div class="flex items-center gap-3">
                        <span class="text-2xl">🇮🇳</span>
                        <span class="font-bold text-gray-700">ಕನ್ನಡ (Kannada)</span>
                    </div>
                    <input type="radio" name="language" value="kn" class="w-5 h-5 text-mulberry focus:ring-mulberry border-gray-300" onchange="setLanguage('kn')">
                </label>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const isKannada = localStorage.getItem('translateToKannada') === 'true';
            if (isKannada) {
                document.querySelector('input[value="kn"]').checked = true;
            } else {
                document.querySelector('input[value="en"]').checked = true;
            }
        });

        function setLanguage(lang) {
            if (lang === 'kn') {
                localStorage.setItem('translateToKannada', 'true');
                if (typeof translateToKannada === 'function') translateToKannada();
            } else {
                localStorage.setItem('translateToKannada', 'false');
                if (typeof translateToEnglish === 'function') translateToEnglish();
            }
        }
    </script>
</body>
</html>
