<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeriFusion - GIS Mulberry Suitability</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="index-tailwind.js"></script>
    <link rel="stylesheet" href="index.css">
</head>
<body class="bg-cream font-sans antialiased text-earthy h-screen overflow-hidden flex flex-col">
    
    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-200 shadow-sm z-50 flex-shrink-0">
        <div class="max-w-full mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-3">
                    <img src="logo.png" alt="SeriFusion Logo" class="w-10 h-10 object-contain rounded-full">
                    <span class="font-bold text-xl tracking-tight text-mulberry-dark">SeriFusion GIS Mapping</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="px-3 py-1 bg-blue-100 text-blue-700 font-bold rounded-full text-xs flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        Satellite Sync Active
                    </span>
                    <a href="manager.html" class="text-sm font-medium text-earthy hover:text-mulberry transition-colors">Back to Dashboard</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Layout -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- Left Sidebar: Map Layers & Filters -->
        <aside class="w-72 bg-white border-r border-gray-200 p-6 flex flex-col shadow-[4px_0_15px_-3px_rgba(0,0,0,0.05)] z-20">
            <h2 class="text-lg font-bold text-mulberry-dark mb-6">Map Layers</h2>
            
            <div class="space-y-6">
                <!-- Layer: Mulberry Suitability -->
                <div class="space-y-3">
                    <label class="flex items-center justify-between cursor-pointer group">
                        <span class="text-sm font-semibold text-gray-700 group-hover:text-mulberry">Overall Suitability</span>
                        <input type="radio" name="layer" value="suitability" checked class="w-4 h-4 text-mulberry focus:ring-mulberry" onchange="changeLayer('suitability')">
                    </label>
                    <div class="w-full h-2 rounded-full bg-gradient-to-r from-red-400 via-yellow-400 to-green-500"></div>
                    <div class="flex justify-between text-[10px] text-gray-500 font-bold uppercase">
                        <span>Low</span>
                        <span>High</span>
                    </div>
                </div>

                <div class="border-t border-gray-100"></div>

                <!-- Layer: Soil Quality -->
                <div class="space-y-3">
                    <label class="flex items-center justify-between cursor-pointer group">
                        <span class="text-sm font-semibold text-gray-700 group-hover:text-mulberry">Soil pH Level</span>
                        <input type="radio" name="layer" value="soil" class="w-4 h-4 text-mulberry focus:ring-mulberry" onchange="changeLayer('soil')">
                    </label>
                    <div class="w-full h-2 rounded-full bg-gradient-to-r from-orange-400 via-gray-300 to-blue-500"></div>
                    <div class="flex justify-between text-[10px] text-gray-500 font-bold uppercase">
                        <span>Acidic</span>
                        <span>Alkaline</span>
                    </div>
                </div>

                <div class="border-t border-gray-100"></div>

                <!-- Layer: Groundwater -->
                <div class="space-y-3">
                    <label class="flex items-center justify-between cursor-pointer group">
                        <span class="text-sm font-semibold text-gray-700 group-hover:text-mulberry">Groundwater Level</span>
                        <input type="radio" name="layer" value="water" class="w-4 h-4 text-mulberry focus:ring-mulberry" onchange="changeLayer('water')">
                    </label>
                    <div class="w-full h-2 rounded-full bg-gradient-to-r from-gray-200 to-blue-600"></div>
                    <div class="flex justify-between text-[10px] text-gray-500 font-bold uppercase">
                        <span>Depleted</span>
                        <span>Abundant</span>
                    </div>
                </div>
            </div>

            <div class="mt-auto">
                <button class="w-full py-3 bg-gray-100 text-gray-600 font-bold text-sm rounded-xl hover:bg-gray-200 transition-colors">
                    Export Geospatial Data
                </button>
            </div>
        </aside>

        <!-- Center: Map Interface (Simulated) -->
        <section class="flex-1 bg-[#e0e7ee] relative overflow-hidden flex items-center justify-center p-8">
            <!-- Simulated Map Texture -->
            <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#000 1px, transparent 1px); background-size: 20px 20px;"></div>
            
            <div class="relative w-full max-w-4xl aspect-[4/3] bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
                
                <!-- Map Grid Overlay -->
                <div id="map-grid" class="absolute inset-0 grid grid-cols-8 grid-rows-6 gap-0 opacity-80">
                    <!-- Grid cells generated by JS -->
                </div>

                <!-- Topographic lines (Simulated with SVG) -->
                <svg class="absolute inset-0 w-full h-full text-gray-300/50 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 800 600">
                    <path stroke-width="1" d="M 0,100 C 200,150 400,50 800,200 M 0,300 C 300,250 500,450 800,350 M 200,600 C 250,400 600,500 800,600 M 400,0 C 450,200 350,400 500,600"></path>
                </svg>

                <div class="absolute top-4 left-4 bg-white/90 backdrop-blur-sm px-4 py-2 rounded-lg shadow-sm border border-gray-100 font-bold text-sm text-gray-700">
                    Gov. Farm Block: <span class="text-mulberry">Sector 4A, Karnataka</span>
                </div>
            </div>
        </section>

        <!-- Right Sidebar: Plot Details -->
        <aside class="w-80 bg-white border-l border-gray-200 p-6 flex flex-col shadow-[-4px_0_15px_-3px_rgba(0,0,0,0.05)] z-20 transition-transform duration-300 transform translate-x-full absolute right-0 inset-y-0" id="plot-details">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-mulberry-dark">Plot Details</h2>
                <button onclick="closePlotDetails()" class="p-2 text-gray-400 hover:text-gray-600 rounded-full hover:bg-gray-100 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div id="plot-content" class="space-y-6">
                <!-- Content injected by JS -->
            </div>

            <div class="mt-auto pt-6 border-t border-gray-100">
                <button class="w-full py-4 bg-mulberry text-white font-bold rounded-xl shadow-md hover:bg-mulberry-dark transform hover:-translate-y-1 transition-all">
                    Allocate for Expansion
                </button>
            </div>
        </aside>

    </main>

    <script>
        // Generate random data for the map grid
        const cols = 8;
        const rows = 6;
        const totalPlots = cols * rows;
        const mapGrid = document.getElementById('map-grid');
        
        let plotsData = [];

        function initMap() {
            for (let i = 0; i < totalPlots; i++) {
                // Generate random stats
                const soilPh = (5.0 + Math.random() * 3.5).toFixed(1); // 5.0 to 8.5
                const waterDepth = Math.floor(10 + Math.random() * 90); // 10m to 100m
                
                // Calculate suitability (Perfect is pH 6.5-7.0 and shallow water)
                let phScore = 100 - Math.abs(6.8 - soilPh) * 30;
                let waterScore = 100 - (waterDepth - 10);
                let suitability = Math.floor((phScore + waterScore) / 2);
                suitability = Math.max(10, Math.min(98, suitability));

                plotsData.push({
                    id: `Plot-${Math.floor(Math.random() * 9000) + 1000}`,
                    suitability: suitability,
                    soilPh: soilPh,
                    waterDepth: waterDepth,
                    rainfall: Math.floor(600 + Math.random() * 400) + ' mm/yr'
                });

                const cell = document.createElement('div');
                cell.className = 'w-full h-full border border-white/20 transition-all duration-300 cursor-pointer hover:border-white hover:border-2 hover:scale-105 hover:z-10 plot-cell';
                cell.onclick = () => showPlotDetails(i);
                mapGrid.appendChild(cell);
            }
            changeLayer('suitability');
        }

        function changeLayer(layerType) {
            const cells = document.querySelectorAll('.plot-cell');
            cells.forEach((cell, index) => {
                const data = plotsData[index];
                let color = '';

                if (layerType === 'suitability') {
                    if (data.suitability > 75) color = 'rgba(34, 197, 94, 0.75)'; // green
                    else if (data.suitability > 40) color = 'rgba(250, 204, 21, 0.6)'; // yellow
                    else color = 'rgba(239, 68, 68, 0.6)'; // red
                } else if (layerType === 'soil') {
                    if (data.soilPh < 6.0) color = 'rgba(249, 115, 22, 0.6)'; // orange (acidic)
                    else if (data.soilPh > 7.5) color = 'rgba(59, 130, 246, 0.6)'; // blue (alkaline)
                    else color = 'rgba(156, 163, 175, 0.4)'; // gray (neutral)
                } else if (layerType === 'water') {
                    const alpha = 0.2 + ((100 - data.waterDepth) / 100) * 0.7;
                    color = `rgba(37, 99, 235, ${alpha})`; // blue scale
                }
                
                cell.style.backgroundColor = color;
            });
        }

        function showPlotDetails(index) {
            const data = plotsData[index];
            const panel = document.getElementById('plot-details');
            const content = document.getElementById('plot-content');
            
            let badgeClass = data.suitability > 75 ? 'bg-green-100 text-green-700' : 
                             data.suitability > 40 ? 'bg-yellow-100 text-yellow-700' : 
                             'bg-red-100 text-red-700';

            content.innerHTML = `
                <div>
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Plot ID</p>
                    <h3 class="text-2xl font-extrabold text-mulberry-dark">${data.id}</h3>
                </div>

                <div class="glass-card bg-gray-50 p-4 rounded-xl border border-gray-100">
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Overall Suitability</p>
                    <div class="flex items-center justify-between">
                        <span class="text-3xl font-extrabold text-gray-800">${data.suitability}<span class="text-lg text-gray-500">%</span></span>
                        <span class="px-3 py-1 rounded-full text-xs font-bold ${badgeClass}">
                            ${data.suitability > 75 ? 'Excellent' : data.suitability > 40 ? 'Moderate' : 'Poor'}
                        </span>
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                        <span class="text-sm font-semibold text-gray-600">Soil pH Level</span>
                        <span class="font-bold text-mulberry-dark">${data.soilPh}</span>
                    </div>
                    <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                        <span class="text-sm font-semibold text-gray-600">Groundwater Depth</span>
                        <span class="font-bold text-mulberry-dark">${data.waterDepth} m</span>
                    </div>
                    <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                        <span class="text-sm font-semibold text-gray-600">Avg. Annual Rainfall</span>
                        <span class="font-bold text-mulberry-dark">${data.rainfall}</span>
                    </div>
                </div>
                
                <div class="bg-blue-50 p-4 rounded-lg flex items-start gap-3">
                    <svg class="w-5 h-5 text-blue-500 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <p class="text-xs text-blue-800 font-medium">
                        ${data.suitability > 75 ? 'Highly recommended for V1 variety mulberry cultivation. Soil is optimal.' : 
                          data.suitability > 40 ? 'Requires soil treatment to optimize pH before planting.' : 
                          'Not recommended. Water table is too low and soil requires heavy amendments.'}
                    </p>
                </div>
            `;
            
            panel.classList.remove('translate-x-full');
        }

        function closePlotDetails() {
            document.getElementById('plot-details').classList.add('translate-x-full');
        }

        // Run on load
        initMap();
    </script>
</body>
</html>
