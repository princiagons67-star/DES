<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeriFusion - Admin Login</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="index-tailwind.js"></script>
    <link rel="stylesheet" href="index.css">
</head>
<body class="bg-cream flex items-center justify-center font-sans antialiased text-earthy min-h-screen py-10">
    
    <div class="bg-overlay"></div>

    <!-- Decorative floating elements -->
    <main class="glass-card w-full max-w-md mx-4 p-8 sm:p-10 rounded-2xl shadow-glass transform transition-all duration-500 hover:shadow-2xl hover:-translate-y-1">
        <!-- Logo and Header -->
        <div class="text-center mb-8">
            <div class="inline-block p-3 rounded-full bg-cream shadow-soft mb-4 border border-mulberry-light/20">
                <img src="logo.png" alt="SeriFusion Logo" class="w-16 h-16 object-contain rounded-full shadow-sm transition-transform duration-500 hover:scale-105">
            </div>
            <h1 class="text-2xl sm:text-3xl font-bold text-mulberry-dark mb-2">Admin Login</h1>
            <p class="text-sm sm:text-base text-earthy/80">Access your system administrator dashboard.</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-6" onsubmit="event.preventDefault(); window.location.href='admin.html';">
            <!-- Email / Username -->
            <div class="space-y-2">
                <label for="email" class="block text-sm font-semibold tracking-wide text-mulberry-dark uppercase">Admin ID / Email</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-mulberry-light" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </div>
                    <input type="text" id="email" required
                        class="input-field w-full pl-10 pr-4 py-3 bg-cream border border-gray-200 rounded-lg text-earthy focus:outline-none focus:ring-2 focus:ring-silkgold/50 placeholder-gray-400"
                        placeholder="admin@serifusion.gov">
                </div>
            </div>

            <!-- Password -->
            <div class="space-y-2">
                <div class="flex items-center justify-between">
                    <label for="password" class="block text-sm font-semibold tracking-wide text-mulberry-dark uppercase">Password</label>
                    <a href="forgot-password.html" class="text-sm text-mulberry hover:text-silkgold transition-colors font-medium">Forgot Password?</a>
                </div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-mulberry-light" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                        </svg>
                    </div>
                    <input type="password" id="password" required
                        class="input-field w-full pl-10 pr-12 py-3 bg-cream border border-gray-200 rounded-lg text-earthy focus:outline-none focus:ring-2 focus:ring-silkgold/50 placeholder-gray-400"
                        placeholder="••••••••">
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" 
                class="btn-primary w-full py-3.5 px-4 bg-mulberry text-white font-semibold rounded-lg shadow-md hover:bg-mulberry-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-mulberry flex justify-center items-center gap-2">
                <span>Login as Admin</span>
                <svg class="w-5 h-5 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </form>

        <!-- Divider -->
        <div class="mt-8 mb-6 relative">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-300"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-2 bg-white text-gray-500 rounded-full text-xs uppercase tracking-wider">New Admin?</span>
            </div>
        </div>

        <!-- Links -->
        <div class="text-center flex flex-col space-y-3">
            <a href="admin-create-account.html" class="link-hover text-mulberry font-semibold transition-colors transform inline-block hover:scale-105">Create Admin Account</a>
            <a href="index.html" class="text-sm text-earthy/80 hover:text-mulberry transition-colors">Back to User Login</a>
        </div>
    </main>
</body>
</html>
