<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeriFusion - Arduino Server</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="index-tailwind.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #a8b58d; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #576341; }
        
        .hero-gradient {
            background: linear-gradient(135deg, #576341 0%, #3c4727 100%);
        }

        .nav-item {
            transition: all 0.3s ease;
        }
        .nav-item:hover, .nav-item.active {
            background: linear-gradient(90deg, rgba(87,99,65,0.08) 0%, rgba(87,99,65,0) 100%);
            color: #576341;
            border-left: 3px solid #576341;
        }
        .nav-item i {
            transition: transform 0.3s ease;
        }
        .nav-item:hover i {
            transform: scale(1.1);
            color: #576341;
        }
        
        .animate-fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
<script src="global-translate.js"></script>
</head>
<body class="bg-[#f5f7f3] text-earthy antialiased flex h-screen overflow-hidden font-sans">

    <!-- Sidebar -->
    <aside class="w-20 lg:w-72 bg-white flex flex-col h-full relative z-30 shadow-soft border-r border-gray-100 transition-all duration-300 flex-shrink-0">
        <div class="p-6 flex items-center justify-center lg:justify-start gap-4 border-b border-gray-100 h-20">
            <div class="relative w-10 h-10 flex items-center justify-center bg-mulberry/10 rounded-xl border border-mulberry/20">
                <img src="logo.png" alt="Logo" class="w-7 h-7 object-contain">
            </div>
            <span class="font-extrabold text-xl text-mulberry-dark hidden lg:block tracking-tight">SeriFusion</span>
        </div>
        
        <div class="py-6 overflow-y-auto flex-1 custom-scrollbar">
            <p class="px-8 text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-4 hidden lg:block">Main Menu</p>
            <nav class="flex flex-col gap-2 px-4">
                <a href="farmer-home.html" class="nav-item flex items-center gap-4 px-4 py-3 rounded-xl font-bold text-gray-500 border-l-[3px] border-transparent">
                    <i class="ph ph-squares-four text-xl"></i>
                    <span class="hidden lg:block">Dashboard</span>
                </a>
                <a href="farm-update.html" class="nav-item flex items-center gap-4 px-4 py-3 rounded-xl font-semibold text-gray-500 border-l-[3px] border-transparent">
                    <i class="ph ph-note-pencil text-xl"></i>
                    <span class="hidden lg:block">Daily Log</span>
                </a>
                <a href="smart-farm.html" class="nav-item flex items-center gap-4 px-4 py-3 rounded-xl font-semibold text-gray-500 border-l-[3px] border-transparent">
                    <i class="ph ph-plant text-xl"></i>
                    <span class="hidden lg:block">Smart Farm</span>
                </a>
                <a href="crop-calendar.html" class="nav-item flex items-center gap-4 px-4 py-3 rounded-xl font-semibold text-gray-500 border-l-[3px] border-transparent">
                    <i class="ph ph-calendar-check text-xl"></i>
                    <span class="hidden lg:block">Crop Calendar</span>
                </a>
                <a href="weather-advisor.html" class="nav-item flex items-center gap-4 px-4 py-3 rounded-xl font-semibold text-gray-500 border-l-[3px] border-transparent">
                    <i class="ph ph-cloud-sun text-xl"></i>
                    <span class="hidden lg:block">Weather Advisor</span>
                </a>
                <a href="silk-exchange.html" class="nav-item flex items-center gap-4 px-4 py-3 rounded-xl font-semibold text-gray-500 border-l-[3px] border-transparent">
                    <i class="ph ph-currency-inr text-xl"></i>
                    <span class="hidden lg:block">Silk Exchange</span>
                </a>
            </nav>
            <p class="px-8 text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-6 mb-4 hidden lg:block">Other Features</p>
            <nav class="flex flex-col gap-2 px-4 pb-4">
                <a href="cocoon-grading.html" class="nav-item flex items-center gap-4 px-4 py-3 rounded-xl font-semibold text-gray-500 border-l-[3px] border-transparent">
                    <i class="ph ph-medal text-xl"></i>
                    <span class="hidden lg:block">Cocoon Grading</span>
                </a>
                <a href="daily-news.html" class="nav-item flex items-center gap-4 px-4 py-3 rounded-xl font-semibold text-gray-500 border-l-[3px] border-transparent">
                    <i class="ph ph-newspaper text-xl"></i>
                    <span class="hidden lg:block">Daily News</span>
                </a>
                <a href="insights.html" class="nav-item flex items-center gap-4 px-4 py-3 rounded-xl font-semibold text-gray-500 border-l-[3px] border-transparent">
                    <i class="ph ph-chart-bar text-xl"></i>
                    <span class="hidden lg:block">Insights</span>
                </a>
                <a href="scheme-engine.html" class="nav-item flex items-center gap-4 px-4 py-3 rounded-xl font-semibold text-gray-500 border-l-[3px] border-transparent">
                    <i class="ph ph-bank text-xl"></i>
                    <span class="hidden lg:block">Scheme Engine</span>
                </a>
                <a href="arduino-dashboard.html" class="nav-item active flex items-center gap-4 px-4 py-3 rounded-xl font-semibold text-gray-500 border-l-[3px] border-transparent">
                    <i class="ph ph-cpu text-xl"></i>
                    <span class="hidden lg:block">Arduino Server</span>
                </a>
                <a href="esp32-plant-monitor.html" class="nav-item flex items-center gap-4 px-4 py-3 rounded-xl font-semibold text-gray-500 border-l-[3px] border-transparent">
                    <i class="ph ph-leaf text-xl"></i>
                    <span class="hidden lg:block">ESP32 Monitor</span>
                </a>
            </nav>
        </div>

        <div class="p-6 border-t border-gray-100 bg-gray-50/50">
            <div class="flex items-center justify-center lg:justify-start gap-4 cursor-pointer hover:opacity-80 transition-opacity">
                <div class="w-10 h-10 rounded-full hero-gradient text-white flex items-center justify-center font-bold shadow-md shadow-mulberry/30">
                    <i class="ph ph-user text-lg"></i>
                </div>
                <div class="hidden lg:block">
                    <p class="text-sm font-bold text-mulberry-dark" id="sidebar-farmer-name">Ramesh Patil</p>
                    <a href="index.html" class="text-xs text-red-500 hover:text-red-600 font-semibold flex items-center gap-1 mt-0.5">
                        <i class="ph ph-sign-out"></i> Logout
                    </a>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 h-full flex flex-col relative z-10 animate-fade-in bg-white">
        <!-- Header area -->
        <header class="sticky top-0 z-20 bg-white/90 backdrop-blur-md border-b border-gray-200/50 px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="ph ph-cpu text-silkgold text-lg"></i>
                <span class="text-sm font-bold text-gray-600">Local Arduino Server</span>
            </div>
            <div class="flex items-center gap-4">
                <div class="relative group">
                    <button class="w-10 h-10 hero-gradient text-white rounded-full flex items-center justify-center shadow-sm transition-transform hover:scale-105 focus:outline-none cursor-pointer">
                        <i class="ph ph-user text-lg"></i>
                    </button>
                    <!-- Dropdown -->
                    <div class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border border-gray-100 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50 transform origin-top-right">
                        <div class="p-2">
                            <a href="settings.html" class="flex items-center gap-2 px-3 py-2 text-sm font-semibold text-gray-700 hover:bg-mulberry/10 hover:text-mulberry rounded-lg transition-colors">
                                <i class="ph ph-gear text-lg"></i> Settings
                            </a>
                            <a href="edit-profile.html" class="flex items-center gap-2 px-3 py-2 text-sm font-semibold text-gray-700 hover:bg-mulberry/10 hover:text-mulberry rounded-lg transition-colors">
                                <i class="ph ph-pencil-simple text-lg"></i> Edit Profile
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex-1 w-full h-full p-0">
            <!-- Ensure arduino server is running on port 5000 -->
            <iframe src="http://localhost:5000" class="w-full h-full border-none" title="Arduino Web Server"></iframe>
        </div>
    </main>

    <script>
        // Load Farmer Data from Firebase or LocalStorage
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const response = await fetch('https://d-e-s-fbaf2-default-rtdb.firebaseio.com/user/details.json');
                const data = await response.json();
                if (data && data.name) {
                    const farmerName = data.name;
                    localStorage.setItem('farmerName', farmerName);
                    const sidebarName = document.getElementById('sidebar-farmer-name');
                    if (sidebarName) sidebarName.textContent = farmerName;
                }
            } catch (error) {
                console.error("Error fetching data from Firebase:", error);
                const farmerName = localStorage.getItem('farmerName');
                if (farmerName) {
                    const sidebarName = document.getElementById('sidebar-farmer-name');
                    if (sidebarName) sidebarName.textContent = farmerName;
                }
            }
        });
    </script>
</body>
</html>
