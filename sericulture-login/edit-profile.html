<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeriFusion - Edit Profile</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="index-tailwind.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="global-translate.js"></script>
</head>
<body class="bg-[#f5f7f3] text-earthy antialiased font-sans">
    <div class="max-w-3xl mx-auto p-8 mt-10">
        <div class="flex items-center gap-4 mb-8">
            <a href="farmer-home.html" class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm text-gray-500 hover:text-mulberry hover:scale-105 transition-all">
                <i class="ph ph-arrow-left text-xl"></i>
            </a>
            <h1 class="text-3xl font-extrabold text-mulberry-dark">Edit Profile</h1>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
            <div class="flex items-center gap-6 mb-8 pb-8 border-b border-gray-100">
                <div class="w-24 h-24 rounded-full bg-mulberry text-white flex items-center justify-center text-3xl font-bold shadow-lg shadow-mulberry/30 relative group cursor-pointer overflow-hidden" id="profile-avatar-container" onclick="document.getElementById('profile-photo-input').click()">
                    <i class="ph ph-user" id="profile-avatar-icon"></i>
                    <div class="absolute inset-0 bg-black/50 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <i class="ph ph-camera text-2xl text-white"></i>
                    </div>
                </div>
                <div>
                    <h2 class="text-2xl font-bold text-gray-800" id="profile-display-name">Ramesh Patil</h2>
                    <p class="text-sm font-medium text-gray-500">Farmer ID: SF-84920</p>
                    <input type="file" id="profile-photo-input" accept="image/*" class="hidden">
                    <div class="flex items-center gap-3 mt-3 flex-wrap">
                        <button type="button" onclick="document.getElementById('profile-photo-input').click()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm font-bold hover:bg-gray-200 transition-colors flex items-center gap-1.5 shadow-sm">
                            <i class="ph ph-upload-simple"></i> Upload Image
                        </button>
                        
                        <div class="flex items-center gap-2 border-l border-gray-200 pl-3">
                            <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">Presets:</span>
                            <img src="https://images.unsplash.com/photo-1595974482597-4b8da8879bc5?auto=format&fit=crop&w=100&h=100&q=80" alt="Farmer 1" onclick="setPresetPhoto(this.src)" class="w-8 h-8 rounded-full cursor-pointer hover:scale-110 hover:border-mulberry transition-all border-2 border-transparent shadow-sm">
                            <img src="https://images.unsplash.com/photo-1500937386664-56d1dfef3854?auto=format&fit=crop&w=100&h=100&q=80" alt="Farmer 2" onclick="setPresetPhoto(this.src)" class="w-8 h-8 rounded-full cursor-pointer hover:scale-110 hover:border-mulberry transition-all border-2 border-transparent shadow-sm">
                            <img src="https://images.unsplash.com/photo-1560493676-04071c5f467b?auto=format&fit=crop&w=100&h=100&q=80" alt="Farmer 3" onclick="setPresetPhoto(this.src)" class="w-8 h-8 rounded-full cursor-pointer hover:scale-110 hover:border-mulberry transition-all border-2 border-transparent shadow-sm">
                            <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=crop&w=100&h=100&q=80" alt="Farmer 4" onclick="setPresetPhoto(this.src)" class="w-8 h-8 rounded-full cursor-pointer hover:scale-110 hover:border-mulberry transition-all border-2 border-transparent shadow-sm">
                        </div>
                    </div>
                </div>
            </div>

            <form class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Full Name</label>
                        <input type="text" id="profile-fullname-input" value="Ramesh Patil" class="w-full bg-gray-50 border border-gray-200 text-gray-800 font-bold rounded-xl focus:ring-mulberry focus:border-mulberry block p-3 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Phone Number</label>
                        <input type="text" value="+91 98765 43210" class="w-full bg-gray-50 border border-gray-200 text-gray-800 font-bold rounded-xl focus:ring-mulberry focus:border-mulberry block p-3 outline-none">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-gray-700 mb-2">Farm Location / Address</label>
                        <input type="text" value="Mysuru District, Karnataka" class="w-full bg-gray-50 border border-gray-200 text-gray-800 font-bold rounded-xl focus:ring-mulberry focus:border-mulberry block p-3 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Total Land Area (Acres)</label>
                        <input type="text" value="4.5" class="w-full bg-gray-50 border border-gray-200 text-gray-800 font-bold rounded-xl focus:ring-mulberry focus:border-mulberry block p-3 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Silkworm Breed Preference</label>
                        <select class="w-full bg-gray-50 border border-gray-200 text-gray-800 font-bold rounded-xl focus:ring-mulberry focus:border-mulberry block p-3 outline-none">
                            <option>Bivoltine</option>
                            <option>Multivoltine</option>
                            <option>Cross Breed</option>
                        </select>
                    </div>
                </div>

                <div class="pt-6 border-t border-gray-100 flex justify-end gap-4">
                    <a href="farmer-home.html" class="px-6 py-3 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition-colors">Cancel</a>
                    <button type="button" onclick="saveProfile()" class="px-6 py-3 bg-mulberry text-white rounded-xl font-bold shadow-lg shadow-mulberry/30 hover:bg-mulberry-dark hover:scale-105 transition-all">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function updateAvatarDisplay(photoData) {
            const container = document.getElementById('profile-avatar-container');
            const icon = document.getElementById('profile-avatar-icon');
            if (container && photoData) {
                container.style.backgroundImage = `url(${photoData})`;
                container.style.backgroundSize = 'cover';
                container.style.backgroundPosition = 'center';
                if (icon) {
                    icon.style.display = 'none';
                }
            }
        }

        function setPresetPhoto(url) {
            localStorage.setItem('farmerPhoto', url);
            updateAvatarDisplay(url);
            
            // Immediately update other avatars on current page if any exist
            document.querySelectorAll('.rounded-full.hero-gradient, .w-24.h-24.rounded-full, .group .hero-gradient').forEach(elem => {
                elem.style.backgroundImage = `url(${url})`;
                elem.style.backgroundSize = 'cover';
                elem.style.backgroundPosition = 'center';
                const icon = elem.querySelector('i');
                if (icon) icon.style.display = 'none';
            });
        }

        document.addEventListener('DOMContentLoaded', async function() {
            // Load photo from local storage
            const photo = localStorage.getItem('farmerPhoto');
            if (photo) {
                updateAvatarDisplay(photo);
            }

            // Setup Photo Change Trigger
            const photoInput = document.getElementById('profile-photo-input');
            if (photoInput) {
                photoInput.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = function(evt) {
                            const base64Data = evt.target.result;
                            localStorage.setItem('farmerPhoto', base64Data);
                            updateAvatarDisplay(base64Data);
                            
                            // Immediately update other avatars on current page if any exist
                            document.querySelectorAll('.rounded-full.hero-gradient, .w-24.h-24.rounded-full, .group .hero-gradient').forEach(elem => {
                                elem.style.backgroundImage = `url(${base64Data})`;
                                elem.style.backgroundSize = 'cover';
                                elem.style.backgroundPosition = 'center';
                                const icon = elem.querySelector('i');
                                if (icon) icon.style.display = 'none';
                            });
                        };
                        reader.readAsDataURL(file);
                    }
                });
            }

            try {
                const response = await fetch('https://d-e-s-fbaf2-default-rtdb.firebaseio.com/user/details.json');
                const data = await response.json();
                if (data && data.name) {
                    const farmerName = data.name;
                    localStorage.setItem('farmerName', farmerName);
                    const displayName = document.getElementById('profile-display-name');
                    const fullnameInput = document.getElementById('profile-fullname-input');
                    if (displayName) displayName.textContent = farmerName;
                    if (fullnameInput) fullnameInput.value = farmerName;
                }
            } catch (error) {
                console.error("Error fetching data from Firebase:", error);
                const farmerName = localStorage.getItem('farmerName');
                if (farmerName) {
                    const displayName = document.getElementById('profile-display-name');
                    const fullnameInput = document.getElementById('profile-fullname-input');
                    if (displayName) displayName.textContent = farmerName;
                    if (fullnameInput) fullnameInput.value = farmerName;
                }
            }
        });

        async function saveProfile() {
            const fullnameInput = document.getElementById('profile-fullname-input');
            const name = fullnameInput.value;
            try {
                await fetch('https://d-e-s-fbaf2-default-rtdb.firebaseio.com/user/details.json', {
                    method: 'PATCH',
                    body: JSON.stringify({ name: name })
                });
                localStorage.setItem('farmerName', name);
                window.location.href = 'farmer-home.html';
            } catch (error) {
                console.error("Error saving to Firebase:", error);
                localStorage.setItem('farmerName', name);
                window.location.href = 'farmer-home.html';
            }
        }
    </script>
</body>
</html>
